name: Cross-platform installation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  clean-library-install:
    name: ${{ matrix.os }} / R release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - name: Install knhanesget and knhanes into an isolated library
        shell: Rscript {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lib <- file.path(tempdir(), "knhanes-smoke-library")
          dir.create(lib, recursive = TRUE)
          .libPaths(c(lib, .Library))
          install.packages(
            c("curl", "jsonlite", "sodium", "tibble"),
            repos = "https://cloud.r-project.org",
            lib = lib
          )
          install.packages(".", repos = NULL, type = "source", lib = lib)
          stopifnot(!any(c("dplyr", "readr", "survey") %in%
            rownames(installed.packages(lib.loc = lib))))
          installer <- getExportedValue("knhanesget", "install_knhanes")
          installer(version = "0.1.0.8", force = TRUE, lib = lib)
          stopifnot(
            identical(
              as.character(packageVersion("knhanes", lib.loc = lib)),
              "0.1.0.8"
            ),
            all(c("dplyr", "readr", "survey") %in%
              rownames(installed.packages(lib.loc = .libPaths())))
          )
          library("knhanes", character.only = TRUE, lib.loc = lib)
          stopifnot("package:knhanes" %in% search())
          installer(version = "0.1.0.8", force = TRUE, lib = lib)
          stopifnot(
            !"package:knhanes" %in% search(),
            identical(
              as.character(packageVersion("knhanes", lib.loc = lib)),
              "0.1.0.8"
            )
          )
